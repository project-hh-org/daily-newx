name: iOS release

# 네이티브 릴리스용: 'ios-v*' 태그 push 시에만 풀 빌드 + TestFlight 제출.
# (JS-only 변경은 빌드 대신 OTA(eas update)로 반영 — yarn ship 사용)
# 예) git tag ios-v0.1.2 && git push origin ios-v0.1.2
on:
  push:
    tags:
      - 'ios-v*'

jobs:
  build_ios:
    type: build
    params:
      platform: ios
      profile: production

  submit_ios:
    needs: [build_ios]
    type: submit
    params:
      platform: ios
      profile: production
